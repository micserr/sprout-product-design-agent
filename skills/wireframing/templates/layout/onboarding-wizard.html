<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onboarding Wizard — Layout Blueprint</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center justify-center py-12 px-4 pl-16">

  <!-- SIDE NAV: fixed, 64px wide, full height, primary icon navigation -->
  <nav class="fixed left-0 top-0 w-16 h-screen bg-gray-900 flex flex-col items-center py-4 z-10">
    <div class="w-8 h-8 bg-gray-600 rounded mb-6 flex items-center justify-center text-xs text-gray-400">L</div>
    <div class="flex flex-col items-center gap-2 flex-1">
      <div class="w-10 h-10 rounded-lg bg-gray-800 flex items-center justify-center">
        <div class="w-5 h-5 bg-gray-500 rounded-sm"></div>
      </div>
      <div class="w-10 h-10 rounded-lg bg-gray-800 flex items-center justify-center">
        <div class="w-5 h-5 bg-gray-500 rounded-sm"></div>
      </div>
      <div class="w-10 h-10 rounded-lg bg-gray-800 flex items-center justify-center">
        <div class="w-5 h-5 bg-gray-500 rounded-sm"></div>
      </div>
      <div class="w-10 h-10 rounded-lg bg-gray-700 flex items-center justify-center">
        <div class="w-5 h-5 bg-gray-300 rounded-sm"></div>
      </div>
    </div>
    <div class="w-8 h-8 rounded-full bg-gray-500 flex items-center justify-center text-xs text-gray-300">U</div>
  </nav>


  <!-- CENTERED SINGLE-COLUMN LAYOUT: max-width constrained, full center alignment -->
  <div class="w-full max-w-lg flex flex-col items-center gap-8">

    <!-- LOGO / BRAND: centered at top -->
    <div class="w-32 h-8 bg-gray-300 rounded flex items-center justify-center text-xs text-gray-500">LOGO</div>

    <!-- STEP INDICATOR: numbered circles connected by lines
         - Completed steps: filled dark circle
         - Current step: filled dark circle (same as completed, distinguish via label)
         - Future steps: outlined circle only
    -->
    <div class="flex items-center gap-0 w-full">

      <!-- STEP 1: completed -->
      <div class="flex flex-col items-center gap-1">
        <div class="w-8 h-8 rounded-full bg-gray-900 flex items-center justify-center text-xs text-white font-semibold">1</div>
        <p class="text-xs text-gray-900 font-medium">STEP 1</p>
      </div>
      <!-- CONNECTOR LINE: filled (step completed) -->
      <div class="flex-1 h-0.5 bg-gray-900 mb-4"></div>

      <!-- STEP 2: current -->
      <div class="flex flex-col items-center gap-1">
        <div class="w-8 h-8 rounded-full bg-gray-900 flex items-center justify-center text-xs text-white font-semibold ring-2 ring-offset-2 ring-gray-900">2</div>
        <p class="text-xs text-gray-900 font-medium">STEP 2</p>
      </div>
      <!-- CONNECTOR LINE: unfilled (step not yet done) -->
      <div class="flex-1 h-0.5 bg-gray-200 mb-4"></div>

      <!-- STEP 3: future -->
      <div class="flex flex-col items-center gap-1">
        <div class="w-8 h-8 rounded-full border-2 border-gray-300 flex items-center justify-center text-xs text-gray-400 font-semibold">3</div>
        <p class="text-xs text-gray-400">STEP 3</p>
      </div>
      <div class="flex-1 h-0.5 bg-gray-200 mb-4"></div>

      <!-- STEP 4: future -->
      <div class="flex flex-col items-center gap-1">
        <div class="w-8 h-8 rounded-full border-2 border-gray-300 flex items-center justify-center text-xs text-gray-400 font-semibold">4</div>
        <p class="text-xs text-gray-400">STEP 4</p>
      </div>

    </div>

    <!-- STEP CARD: contains step title, description, fields, and navigation buttons -->
    <div class="w-full bg-white border border-gray-200 rounded">

      <!-- STEP HEADER -->
      <div class="px-6 pt-6 pb-4 border-b border-gray-100">
        <h2 class="text-lg font-semibold text-gray-900">STEP TITLE</h2>
        <p class="text-sm text-gray-400 mt-1">STEP DESCRIPTION PLACEHOLDER</p>
      </div>

      <!-- STEP BODY: form fields for this step -->
      <div class="px-6 py-5 flex flex-col gap-4">
        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-gray-700">FIELD LABEL <span class="text-gray-400">*</span></label>
          <input type="text" placeholder="PLACEHOLDER TEXT" class="border border-gray-300 rounded px-3 py-2 text-sm text-gray-900 outline-none focus:border-gray-500" />
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-sm font-medium text-gray-700">FIELD LABEL</label>
          <input type="text" placeholder="PLACEHOLDER TEXT" class="border border-gray-300 rounded px-3 py-2 text-sm text-gray-900 outline-none focus:border-gray-500" />
          <p class="text-xs text-gray-400">HELPER TEXT</p>
        </div>
      </div>

      <!-- STEP FOOTER: navigation buttons (Back left, Continue/Finish right)
           - Back is disabled on step 1
           - Continue changes to "Finish" on last step
      -->
      <div class="px-6 py-4 border-t border-gray-100 flex items-center justify-between">
        <!-- BACK: disabled on first step -->
        <button class="px-4 py-2 border border-gray-200 rounded text-sm text-gray-400 cursor-not-allowed" disabled>BACK</button>
        <button class="px-4 py-2 bg-gray-900 rounded text-sm text-white hover:bg-gray-700">CONTINUE</button>
      </div>

    </div>

    <!-- SKIP LINK: below the card, centered -->
    <button class="text-sm text-gray-400 hover:text-gray-600 underline">SKIP FOR NOW</button>

  </div>

</body>
</html>
