<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form Page — Layout Blueprint</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col pl-16">

  <!-- SIDE NAV: fixed, 64px wide, full height, primary icon navigation -->
  <nav class="fixed left-0 top-0 w-16 h-screen bg-gray-900 flex flex-col items-center py-4 z-10">
    <div class="w-8 h-8 bg-gray-600 rounded mb-6 flex items-center justify-center text-xs text-gray-400">L</div>
    <div class="flex flex-col items-center gap-2 flex-1">
      <div class="w-10 h-10 rounded-lg bg-gray-800 flex items-center justify-center">
        <div class="w-5 h-5 bg-gray-500 rounded-sm"></div>
      </div>
      <div class="w-10 h-10 rounded-lg bg-gray-700 flex items-center justify-center">
        <div class="w-5 h-5 bg-gray-300 rounded-sm"></div>
      </div>
      <div class="w-10 h-10 rounded-lg bg-gray-800 flex items-center justify-center">
        <div class="w-5 h-5 bg-gray-500 rounded-sm"></div>
      </div>
      <div class="w-10 h-10 rounded-lg bg-gray-800 flex items-center justify-center">
        <div class="w-5 h-5 bg-gray-500 rounded-sm"></div>
      </div>
    </div>
    <div class="w-8 h-8 rounded-full bg-gray-500 flex items-center justify-center text-xs text-gray-300">U</div>
  </nav>

<!-- CONTENT AREA: centered, single-column, max-width constrained -->
  <main class="flex-1 flex justify-center py-8 px-4">
    <div class="w-full max-w-2xl flex flex-col gap-6">

      <!-- PAGE HEADER -->
      <div>
        <h1 class="text-xl font-semibold text-gray-900">FORM TITLE</h1>
        <p class="text-sm text-gray-400 mt-0.5">FORM DESCRIPTION PLACEHOLDER</p>
      </div>

      <!-- FORM CARD: single card with multiple sections separated by dividers -->
      <div class="bg-white border border-gray-200 rounded">

        <!-- SECTION 1: Basic Information — text inputs with labels and helper text -->
        <div class="p-6 flex flex-col gap-4">
          <p class="text-sm font-semibold text-gray-700">SECTION 1 TITLE</p>

          <!-- FIELD: label + input + helper text -->
          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700">FIELD LABEL <span class="text-gray-400">*</span></label>
            <input type="text" placeholder="PLACEHOLDER TEXT" class="border border-gray-300 rounded px-3 py-2 text-sm text-gray-900 outline-none focus:border-gray-500" />
            <p class="text-xs text-gray-400">HELPER TEXT</p>
          </div>

          <!-- FIELD: label + input -->
          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700">FIELD LABEL</label>
            <input type="text" placeholder="PLACEHOLDER TEXT" class="border border-gray-300 rounded px-3 py-2 text-sm text-gray-900 outline-none focus:border-gray-500" />
          </div>
        </div>

        <!-- DIVIDER between sections -->
        <div class="border-t border-gray-100"></div>

        <!-- SECTION 2: Details — textarea + select dropdown -->
        <div class="p-6 flex flex-col gap-4">
          <p class="text-sm font-semibold text-gray-700">SECTION 2 TITLE</p>

          <!-- FIELD: textarea -->
          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700">TEXTAREA LABEL</label>
            <textarea rows="4" placeholder="PLACEHOLDER TEXT" class="border border-gray-300 rounded px-3 py-2 text-sm text-gray-900 outline-none focus:border-gray-500 resize-none"></textarea>
          </div>

          <!-- FIELD: select dropdown -->
          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700">SELECT LABEL</label>
            <select class="border border-gray-300 rounded px-3 py-2 text-sm text-gray-500 outline-none focus:border-gray-500 bg-white">
              <option value="">SELECT AN OPTION</option>
              <option>OPTION 1</option>
              <option>OPTION 2</option>
              <option>OPTION 3</option>
            </select>
          </div>
        </div>

        <!-- DIVIDER -->
        <div class="border-t border-gray-100"></div>

        <!-- SECTION 3: Preferences — checkbox list with descriptions -->
        <div class="p-6 flex flex-col gap-4">
          <p class="text-sm font-semibold text-gray-700">SECTION 3 TITLE</p>

          <!-- CHECKBOX OPTION: checkbox + label + description text below -->
          <div class="flex items-start gap-3">
            <input type="checkbox" class="mt-0.5 w-4 h-4 border border-gray-300 rounded" />
            <div>
              <p class="text-sm font-medium text-gray-700">OPTION LABEL</p>
              <p class="text-xs text-gray-400 mt-0.5">OPTION DESCRIPTION PLACEHOLDER</p>
            </div>
          </div>
          <div class="flex items-start gap-3">
            <input type="checkbox" class="mt-0.5 w-4 h-4 border border-gray-300 rounded" checked />
            <div>
              <p class="text-sm font-medium text-gray-700">OPTION LABEL (CHECKED)</p>
              <p class="text-xs text-gray-400 mt-0.5">OPTION DESCRIPTION PLACEHOLDER</p>
            </div>
          </div>
          <div class="flex items-start gap-3">
            <input type="checkbox" class="mt-0.5 w-4 h-4 border border-gray-300 rounded" />
            <div>
              <p class="text-sm font-medium text-gray-700">OPTION LABEL</p>
              <p class="text-xs text-gray-400 mt-0.5">OPTION DESCRIPTION PLACEHOLDER</p>
            </div>
          </div>
        </div>

        <!-- DIVIDER -->
        <div class="border-t border-gray-100"></div>

        <!-- FORM FOOTER: action buttons, right-aligned (secondary + primary) -->
        <div class="px-6 py-4 flex justify-end gap-3">
          <button class="px-4 py-2 rounded border border-gray-300 text-sm text-gray-700 hover:bg-gray-50">CANCEL</button>
          <button class="px-4 py-2 rounded bg-gray-900 text-sm text-white hover:bg-gray-700">SAVE</button>
        </div>

      </div>
    </div>
  </main>

</body>
</html>
